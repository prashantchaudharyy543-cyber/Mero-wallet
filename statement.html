<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Statement</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- HEADER -->

<header class="statement-header">

<button class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>Statement</h2>

<button class="filter-btn">

<i class="fa-solid fa-sliders"></i>

</button>

</header>

<!-- SUMMARY -->

<section class="summary-card">

<div>

<p>Total Income</p>

<h3>Rs. 85,000</h3>

</div>

<div>

<p>Total Expense</p>

<h3>Rs. 28,450</h3>

</div>

</section>

<!-- SEARCH -->

<div class="statement-search">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
placeholder="Search transaction">

</div>

<!-- TODAY -->

<h3 class="statement-title">

Today

</h3>

<div class="transaction-list">

<div class="transaction success">

<div class="icon">

<i class="fa-solid fa-arrow-up"></i>

</div>

<div class="details">

<h4>Sent to Ram Sharma</h4>

<p>Today • 10:35 AM</p>

</div>

<div class="amount">

-Rs.500

</div>

</div>

<div class="transaction receive">

<div class="icon">

<i class="fa-solid fa-arrow-down"></i>

</div>

<div class="details">

<h4>Received from Hari KC</h4>

<p>Today • 08:20 AM</p>

</div>

<div class="amount positive">

+Rs.1,200

</div>

</div>

</div>

<!-- YESTERDAY -->

<h3 class="statement-title">

Yesterday

</h3>

<div class="transaction-list">

<div class="transaction">

<div class="icon">

<i class="fa-solid fa-mobile-screen"></i>

</div>

<div class="details">

<h4>NTC Topup</h4>

<p>Yesterday</p>

</div>

<div class="amount">

-Rs.100

</div>

</div>

<div class="transaction">

<div class="icon">

<i class="fa-solid fa-bolt"></i>

</div>

<div class="details">

<h4>Electricity Bill</h4>

<p>Yesterday</p>

</div>

<div class="amount">

-Rs.1850

</div>

</div>

</div>

</div>

<script src="statement.js"></script>

</body>

</html>
