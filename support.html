<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="support-header">

<button class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>Support Center</h2>

<button class="support-search">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

</header>

<section class="support-banner">

<h2>How can we help you?</h2>

<p>24/7 Customer Support</p>

</section>

<div class="support-grid">

<div class="support-card" id="liveChat">

<i class="fa-solid fa-comments"></i>

<h3>Live Chat</h3>

<p>Chat with our support team</p>

</div>

<div class="support-card" id="callSupport">

<i class="fa-solid fa-phone"></i>

<h3>Call</h3>

<p>Talk to customer care</p>

</div>

<div class="support-card" id="emailSupport">

<i class="fa-solid fa-envelope"></i>

<h3>Email</h3>

<p>Send us your issue</p>

</div>

<div class="support-card" id="faq">

<i class="fa-solid fa-circle-question"></i>

<h3>FAQ</h3>

<p>Frequently asked questions</p>

</div>

</div>

<h3 class="section-title">

Recent Help Topics

</h3>

<div class="help-list">

<div class="help-item">

<i class="fa-solid fa-wallet"></i>

<span>Wallet Issue</span>

<i class="fa-solid fa-angle-right"></i>

</div>

<div class="help-item">

<i class="fa-solid fa-building-columns"></i>

<span>Bank Transfer</span>

<i class="fa-solid fa-angle-right"></i>

</div>

<div class="help-item">

<i class="fa-solid fa-qrcode"></i>

<span>QR Payment</span>

<i class="fa-solid fa-angle-right"></i>

</div>

<div class="help-item">

<i class="fa-solid fa-shield-halved"></i>

<span>Security & MPIN</span>

<i class="fa-solid fa-angle-right"></i>

</div>

</div>

</div>

<script src="support.js"></script>

</body>

</html>
