<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Bill Payment Success</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="bill-success.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="success-page">

<div class="receipt-card">

<div class="success-icon">

<i class="fa-solid fa-circle-check"></i>

</div>

<h2>Payment Successful</h2>

<p>Your bill payment has been completed.</p>

<div class="receipt-box">

<div class="receipt-row">

<span>Service</span>

<strong id="serviceName"></strong>

</div>

<div class="receipt-row">

<span>Amount</span>

<strong id="paidAmount"></strong>

</div>

<div class="receipt-row">

<span>Date</span>

<strong id="paidDate"></strong>

</div>

<div class="receipt-row">

<span>Transaction ID</span>

<strong id="txnId"></strong>

</div>

<div class="receipt-row">

<span>Status</span>

<strong class="success-text">

SUCCESS

</strong>

</div>

</div>

<button id="shareReceipt">

<i class="fa-solid fa-share"></i>

Share Receipt

</button>

<button id="printReceipt">

<i class="fa-solid fa-print"></i>

Print Receipt

</button>

<button id="homeBtn">

<i class="fa-solid fa-house"></i>

Back to Home

</button>

</div>

</div>

<script src="bill-success.js"></script>

</body>

</html>
