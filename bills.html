<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Bills & Recharge</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="bills.css">

</head>

<body>

<div class="bill-page">

<header class="bill-header">

<button class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>Bills & Recharge</h2>

<div style="width:45px;"></div>

</header>

<!-- Search -->

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="billSearch"
placeholder="Search services">

</div>

<!-- Services -->

<div class="bill-grid">

<div class="bill-card">

<i class="fa-solid fa-bolt"></i>

<h4>Electricity</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-droplet"></i>

<h4>Water</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-wifi"></i>

<h4>Internet</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-tv"></i>

<h4>TV</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-mobile-screen"></i>

<h4>Mobile</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-phone"></i>

<h4>Landline</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-graduation-cap"></i>

<h4>Education</h4>

</div>

<div class="bill-card">

<i class="fa-solid fa-gas-pump"></i>

<h4>Gas</h4>

</div>

</div>

<!-- ==========================
     BILL PAYMENT FORM
========================== -->

<div class="payment-form">

<h3>Quick Payment</h3>

<label>Service Provider</label>

<select id="provider">

<option value="NTC">NTC</option>

<option value="Ncell">Ncell</option>

<option value="Smart Cell">Smart Cell</option>

<option value="NEA">Nepal Electricity Authority</option>

<option value="DishHome">DishHome</option>

<option value="WorldLink">WorldLink</option>

<option value="Vianet">Vianet</option>

</select>

<label>Consumer / Mobile Number</label>

<input
type="text"
id="consumerNumber"
placeholder="Enter Number">

<label>Amount (Rs.)</label>

<input
type="number"
id="billAmount"
placeholder="Enter Amount">

<button id="payBillBtn">

Pay Bill

</button>

</div>

<!-- Recent Payments -->

<div class="history-card">

<h3>Recent Bill Payments</h3>

<ul id="billHistory">

<li>
Electricity
<span>Rs. 1,250</span>
</li>

<li>
NT Fiber
<span>Rs. 1,500</span>
</li>

<li>
Mobile Recharge
<span>Rs. 200</span>
</li>

</ul>

</div>

</div>

<script src="bills.js"></script>

</body>

</html>
